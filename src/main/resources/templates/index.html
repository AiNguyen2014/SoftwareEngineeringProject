<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <title th:text="${param.category != null ? 'Giày ' + param.category : 'WebShoe - Trang Chủ'}">WebShoe</title>
    <th:block th:replace="fragments :: head_header"></th:block>
</head>
<body>

<div th:replace="fragments :: header"></div>

<div class="container-fluid px-0 mb-5" th:if="${param.category == null}">
    <div class="bg-light py-5 text-center" style="background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);">
        <h1 class="display-4 fw-bold text-dark">NEW ARRIVALS 2025</h1>
        <p class="lead text-muted">Khám phá bộ sưu tập giày thể thao đẳng cấp</p>
        <a href="#products" class="btn btn-dark btn-lg rounded-pill px-4 mt-2">Mua Ngay</a>
    </div>
</div>

<main class="container my-5" id="products">
    <div class="d-flex justify-content-between align-items-end mb-4 border-bottom pb-2">
        <h2 class="fw-bold text-uppercase m-0"
            th:text="${param.category != null ? 'GIÀY ' + param.category : 'TẤT CẢ SẢN PHẨM'}">
        </h2>
        <span class="text-muted small" th:text="${totalItems} + ' sản phẩm'"></span>
    </div>

    <div class="product-grid">
        <div class="product-card" th:each="product : ${products}">
            <a th:href="@{/product/{id}(id=${product.id})}" class="d-block product-img-wrap">
                <img th:src="${product.thumbnailUrl}" th:alt="${product.name}" loading="lazy">

                <div class="badge-overlay">
                    <span class="custom-badge badge-new" th:if="${product.isNew}">NEW</span>
                    <span class="custom-badge badge-sale" th:if="${product.isNew == false}">HOT</span>
                </div>
            </a>

            <div class="product-info">
                <div class="product-brand">NIKE</div> <a th:href="@{/product/{id}(id=${product.id})}" class="product-title" th:text="${product.name}">
                Nike Air Jordan 1
            </a>
                <div class="product-price" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                    3,500,000 ₫
                </div>
            </div>
        </div>
    </div>

    <nav th:if="${totalPages > 1}" class="mt-5">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                <a class="page-link border-0 rounded-circle mx-1" th:href="@{/(page=${currentPage - 1}, category=${param.category})}">
                    <i class="fas fa-chevron-left"></i>
                </a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                th:classappend="${currentPage == i} ? 'active'">
                <a class="page-link border-0 rounded-circle mx-1"
                   th:href="@{/(page=${i}, category=${param.category})}"
                   th:text="${i}"
                   th:style="${currentPage == i} ? 'background-color: var(--primary-color); color: white;' : 'color: var(--text-dark)'">
                </a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                <a class="page-link border-0 rounded-circle mx-1" th:href="@{/(page=${currentPage + 1}, category=${param.category})}">
                    <i class="fas fa-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>

</main>

<div th:replace="fragments :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
