<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>WebShoe - Trang Chủ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="mb-4 text-center">DANH SÁCH GIÀY HOT</h2>

    <div class="row">
        <div class="col-md-3 mb-4" th:each="shoe : ${listShoes}">
            <div class="card h-100 shadow-sm">
                <img th:src="${shoe.imageUrl}" class="card-img-top" alt="Giày" style="height: 200px; object-fit: cover;">
                <div class="card-body">
                    <h5 class="card-title" th:text="${shoe.name}">Tên Giày</h5>
                    <p class="card-text text-danger fw-bold" th:text="${#numbers.formatDecimal(shoe.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></p>

                    <a th:href="@{/product/{id}(id=${shoe.shoeId})}" class="btn btn-primary w-100">Xem Chi Tiết</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
