<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <title>Lỗi - WebShoe</title>
    <th:block th:replace="fragments :: head_header"></th:block>
</head>
<body>

<!-- Header -->
<div th:replace="fragments :: header"></div>

<!-- Error Content -->
<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">

            <!-- Error Icon -->
            <div class="mb-4">
                <i class="fas fa-exclamation-triangle text-warning" style="font-size: 6rem;"></i>
            </div>

            <!-- Error Code -->
            <h1 class="display-1 fw-bold" th:text="${errorCode} ?: '404'">404</h1>

            <!-- Error Message -->
            <h2 class="mb-4" th:text="${errorMessage} ?: 'Không tìm thấy trang'">
                Không tìm thấy trang
            </h2>

            <p class="text-muted mb-4">
                Trang bạn đang tìm kiếm không tồn tại hoặc đã bị xóa.
            </p>

            <!-- Action Buttons -->
            <div class="d-flex justify-content-center gap-3">
                <a href="/" th:href="@{/}" class="btn btn-primary">
                    <i class="fas fa-home"></i> Về trang chủ
                </a>
                <button onclick="history.back()" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left"></i> Quay lại
                </button>
            </div>

        </div>
    </div>
</main>

<!-- Footer -->
<div th:replace="fragments :: footer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
