<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <title th:text="${product.name} + ' | WebShoe'">Chi tiết</title>
    <th:block th:replace="fragments :: head_header"></th:block>
</head>
<body>

<div th:replace="fragments :: header"></div>

<main class="container py-5">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb small text-uppercase fw-bold">
            <li class="breadcrumb-item"><a href="/" class="text-muted">Trang chủ</a></li>
            <li class="breadcrumb-item"><a href="#" class="text-muted" th:text="${product.category}">Nam</a></li>
            <li class="breadcrumb-item active text-dark" aria-current="page" th:text="${product.name}">SP</li>
        </ol>
    </nav>

    <div class="row g-5">
        <div class="col-lg-7 detail-gallery">
            <div class="main-img-box bg-white shadow-sm position-relative">

                <img id="mainImage"
                     th:src="${(product.imageUrls != null and !#lists.isEmpty(product.imageUrls)) ? product.imageUrls[0] : 'https://placehold.co/800x800?text=No+Image'}"
                     th:alt="${product.name}"
                     style="width: 100%; height: 100%; object-fit: cover;">

                <div class="position-absolute top-0 start-0 p-3" th:if="${product.isNew}">
                    <span class="badge bg-warning text-dark shadow-sm">NEW ARRIVAL</span>
                </div>
            </div>

            <div class="thumb-list" th:if="${product.imageUrls != null and not #lists.isEmpty(product.imageUrls)}">
                <div class="thumb-item" th:each="img, stat : ${product.imageUrls}">
                    <img th:src="${img}"
                         onclick="changeImage(this)"
                         th:classappend="${stat.index == 0} ? 'active'"
                         alt="Thumbnail">
                </div>
            </div>
        </div>

        <div class="col-lg-5 detail-info">
            <div class="text-uppercase text-muted fw-bold small mb-2" th:text="${product.brand}">BRAND</div>
            <h1 th:text="${product.name}">Tên Sản Phẩm</h1>

            <div class="detail-price"
                 th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                2.000.000 ₫
            </div>

            <hr class="my-4 opacity-25">

            <form action="#">
                <div class="option-group mb-4" th:if="${product.colors != null and !product.colors.isEmpty()}">
                    <label>Màu sắc:</label>
                    <div class="d-flex flex-wrap">
                        <label class="selector-item" th:each="color : ${product.colors}">
                            <input type="radio" name="color" th:value="${color}">
                            <span th:text="${color}">Black</span>
                        </label>
                    </div>
                </div>

                <div class="option-group mb-4" th:if="${product.sizes != null and !product.sizes.isEmpty()}">
                    <label>Kích thước (Size):</label>
                    <div class="d-flex flex-wrap">
                        <label class="selector-item" th:each="size : ${product.sizes}">
                            <input type="radio" name="size" th:value="${size}">
                            <span th:text="${size}">40</span>
                        </label>
                    </div>
                </div>

                <div class="d-flex gap-3 mt-5">
                    <div style="width: 100px;">
                        <input type="number" class="form-control form-control-lg text-center fw-bold" value="1" min="1">
                    </div>
                    <button type="button" class="btn-add-cart flex-grow-1">
                        <i class="fas fa-shopping-bag me-2"></i> Thêm vào giỏ
                    </button>
                </div>
            </form>

            <div class="mt-5">
                <h5 class="fw-bold text-uppercase border-bottom pb-2 mb-3">Mô tả chi tiết</h5>
                <div class="text-muted" style="line-height: 1.8; white-space: pre-line;"
                     th:text="${product.description}">
                    Nội dung mô tả...
                </div>
            </div>
        </div>
    </div>

    <div class="mt-5 pt-5 border-top" th:if="${product.relatedProducts != null and !product.relatedProducts.isEmpty()}">
        <h3 class="fw-bold text-center mb-4 text-uppercase">Sản phẩm tương tự</h3>
        <div class="product-grid">
            <div class="product-card" th:each="related : ${product.relatedProducts}">
                <a th:href="@{/product/{id}(id=${related.id})}" class="d-block product-img-wrap">
                    <img th:src="${related.thumbnailUrl}" loading="lazy">
                    <div class="badge-overlay" th:if="${related.outOfStock}">
                        <span class="custom-badge bg-danger text-white">Hết hàng</span>
                    </div>
                </a>
                <div class="product-info">
                    <div class="product-brand">WEBSHOE</div>
                    <a th:href="@{/product/{id}(id=${related.id})}" class="product-title" th:text="${related.name}">Name</a>
                    <div class="product-price" th:text="${#numbers.formatDecimal(related.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">Price</div>
                </div>
            </div>
        </div>
    </div>

</main>

<div th:replace="fragments :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function changeImage(thumb) {
        // Change Main Image
        const mainImg = document.getElementById('mainImage');

        // Simple fade effect
        mainImg.style.opacity = 0.7;
        setTimeout(() => {
            mainImg.src = thumb.src;
            mainImg.style.opacity = 1;
        }, 150);

        // Update Active Class
        document.querySelectorAll('.thumb-item img').forEach(img => img.classList.remove('active'));
        thumb.classList.add('active');
    }
</script>
</body>
</html>
